<svg width="100%" height="100%" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7a5414"/>
      <stop offset="45%" stop-color="#e8b23a"/>
      <stop offset="100%" stop-color="#fff0b8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rc"><rect x="0" y="0" width="512" height="512" rx="100" ry="100"/></clipPath>
  </defs>
  <g clip-path="url(#rc)">
    <rect x="0" y="0" width="512" height="512" fill="#0a0a0a"/>

    <g filter="url(#glow)">
      <rect x="120" y="330" width="46" height="110" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
      <rect x="190" y="290" width="46" height="150" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
      <rect x="260" y="250" width="46" height="190" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
      <rect x="330" y="210" width="46" height="230" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
    </g>

    <g filter="url(#glow)">
      <polyline points="90,300 175,235 220,270 400,120" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="400,120 350,128 392,168" fill="url(#gold)"/>
    </g>
  </g>
</svg>
